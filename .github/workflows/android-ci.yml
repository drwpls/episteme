name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.flavor.label }} debug
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - label: oss
            gradle: oss
          - label: standard
            gradle: standard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME

      - name: Install required Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            --sdk_root=$ANDROID_HOME

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug
        run: |
          TASK=":app:assembleDebug"
          if [ "${{ matrix.flavor.gradle }}" = "oss" ]; then
            TASK=":app:assembleOssDebug"
          fi
          ./gradlew "$TASK"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor.label }}
          path: app/build/outputs/apk/**/*.apk
